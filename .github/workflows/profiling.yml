name: profiling
on:
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - run: echo "profiling\n"
      - run: |
          echo "building\n"
          make build=release

          echo "starting server\n"
          ./build/main 5980 &

          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server
        run: sleep 5
      - name: Run benchmarking
        run: python benchmark.py > benchmark_results.txt

      - name: Stop Server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: |
            benchmark_results.txt
            server.log
      - name: cat server.log
        run: cat server.log
